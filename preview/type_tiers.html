<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body style="padding:24px">
<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px">
  
  <div style="border:1px solid var(--color-line-normal);border-radius:16px;padding:16px" data-typography-scale="normal">
    <div style="font-size:11px;color:var(--color-label-alternative);font-weight:600;text-transform:uppercase;margin-bottom:8px">normal</div>
    <div style="font-size:var(--font-size-2xl);line-height:var(--line-height-2xl);font-weight:600;margin-bottom:4px">일반 보기</div>
    <div style="font-size:var(--font-size-md);line-height:var(--line-height-md)">가족 소식</div>
    <div style="font-size:var(--font-size-sm);line-height:var(--line-height-sm);color:var(--color-label-alternative)">보조 텍스트</div>
  </div>
  <div style="border:1px solid var(--color-line-normal);border-radius:16px;padding:16px" data-typography-scale="large">
    <div style="font-size:11px;color:var(--color-label-alternative);font-weight:600;text-transform:uppercase;margin-bottom:8px">large</div>
    <div style="font-size:var(--font-size-2xl);line-height:var(--line-height-2xl);font-weight:600;margin-bottom:4px">크게 보기</div>
    <div style="font-size:var(--font-size-md);line-height:var(--line-height-md)">가족 소식</div>
    <div style="font-size:var(--font-size-sm);line-height:var(--line-height-sm);color:var(--color-label-alternative)">보조 텍스트</div>
  </div>
  <div style="border:1px solid var(--color-line-normal);border-radius:16px;padding:16px" data-typography-scale="x-large">
    <div style="font-size:11px;color:var(--color-label-alternative);font-weight:600;text-transform:uppercase;margin-bottom:8px">x-large</div>
    <div style="font-size:var(--font-size-2xl);line-height:var(--line-height-2xl);font-weight:600;margin-bottom:4px">더 크게 보기</div>
    <div style="font-size:var(--font-size-md);line-height:var(--line-height-md)">가족 소식</div>
    <div style="font-size:var(--font-size-sm);line-height:var(--line-height-sm);color:var(--color-label-alternative)">보조 텍스트</div>
  </div>
</div></body></html>
