<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body style="padding:24px">
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px">
  <div>
    <div style="font-size:12px;font-weight:600;color:var(--color-label-alternative);margin-bottom:6px">BACKGROUND</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:var(--color-bg-white);border-radius:6px;border:1px solid var(--color-line-normal)"></div><span style="font-size:13px">bg-white</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:var(--color-bg-50);border-radius:6px;border:1px solid var(--color-line-normal)"></div><span style="font-size:13px">bg-50</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:var(--color-bg-100);border-radius:6px;border:1px solid var(--color-line-normal)"></div><span style="font-size:13px">bg-100</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:var(--color-bg-200);border-radius:6px;border:1px solid var(--color-line-normal)"></div><span style="font-size:13px">bg-200</span></div>
  </div>
  <div>
    <div style="font-size:12px;font-weight:600;color:var(--color-label-alternative);margin-bottom:6px">FILL</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:var(--color-fill-alternative);border-radius:6px;border:1px solid var(--color-line-normal)"></div><span style="font-size:13px">fill.alternative</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:var(--color-fill-normal);border-radius:6px;border:1px solid var(--color-line-normal)"></div><span style="font-size:13px">fill.normal</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:var(--color-fill-strong);border-radius:6px;border:1px solid var(--color-line-normal)"></div><span style="font-size:13px">fill.strong</span></div>
  </div>
  <div>
    <div style="font-size:12px;font-weight:600;color:var(--color-label-alternative);margin-bottom:6px">LINE</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:white;border:2px solid var(--color-line-normal);border-radius:6px"></div><span style="font-size:13px">line.normal</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:white;border:2px solid var(--color-line-neutral);border-radius:6px"></div><span style="font-size:13px">line.neutral</span></div><div style="display:flex;align-items:center;gap:8px;margin-bottom:4px"><div style="width:24px;height:24px;background:white;border:2px solid var(--color-line-alternative);border-radius:6px"></div><span style="font-size:13px">line.alternative</span></div>
  </div>
</div></body></html>
