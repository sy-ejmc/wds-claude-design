<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body style="padding:24px">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
  
  <div>
    <div style="background:var(--color-status-success);height:72px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">status.success</div>
  </div>
  <div>
    <div style="background:var(--color-status-warning);height:72px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">status.warning</div>
  </div>
  <div>
    <div style="background:var(--color-status-error);height:72px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">status.error</div>
  </div>
  <div>
    <div style="background:var(--color-status-info);height:72px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">status.info</div>
  </div>
</div></body></html>
