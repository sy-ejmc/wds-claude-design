<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body style="padding:24px">
<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
  
  <div>
    <div style="background:var(--color-label-strong);height:64px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">label.strong</div>
  </div>
  <div>
    <div style="background:var(--color-label-normal);height:64px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">label.normal</div>
  </div>
  <div>
    <div style="background:var(--color-label-neutral);height:64px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">label.neutral</div>
  </div>
  <div>
    <div style="background:var(--color-label-alternative);height:64px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">label.alternative</div>
  </div>
  <div>
    <div style="background:var(--color-label-assistive);height:64px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">label.assistive</div>
  </div>
  <div>
    <div style="background:var(--color-label-disable);height:64px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">label.disable</div>
  </div>
  <div>
    <div style="background:var(--color-label-white);height:64px;border-radius:16px;border:1px solid var(--color-line-normal)"></div>
    <div style="margin-top:6px;font-weight:600;font-size:13px">label.white</div>
  </div>
</div></body></html>
