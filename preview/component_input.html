<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body style="padding:24px">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
  <div>
    <label style="display:block;font-size:13px;color:var(--color-label-alternative);margin-bottom:4px">전화번호</label>
    <input value="010-1234-5678" style="width:100%;padding:10px 14px;font-family:var(--font-family);font-size:var(--font-size-md);border:1px solid var(--color-line-normal);border-radius:var(--radius-s);background:var(--color-bg-white);color:var(--color-label-normal)">
  </div>
  <div>
    <label style="display:block;font-size:13px;color:var(--color-label-alternative);margin-bottom:4px">포커스</label>
    <input value="010-1234-5678" style="width:100%;padding:10px 14px;font-family:var(--font-family);font-size:var(--font-size-md);border:1.5px solid var(--color-primary-normal);border-radius:var(--radius-s);background:var(--color-bg-white);color:var(--color-label-normal);outline:none">
  </div>
  <div>
    <label style="display:block;font-size:13px;color:var(--color-label-alternative);margin-bottom:4px">에러</label>
    <input value="010-" style="width:100%;padding:10px 14px;font-family:var(--font-family);font-size:var(--font-size-md);border:1.5px solid var(--color-status-error);border-radius:var(--radius-s);background:var(--color-bg-white)">
    <div style="font-size:12px;color:var(--color-status-error);margin-top:4px">번호가 맞는지 확인해 주세요.</div>
  </div>
  <div>
    <label style="display:block;font-size:13px;color:var(--color-label-disable);margin-bottom:4px">비활성</label>
    <input value="" disabled style="width:100%;padding:10px 14px;font-family:var(--font-family);font-size:var(--font-size-md);border:1px solid var(--color-line-normal);border-radius:var(--radius-s);background:var(--color-interaction-disable);color:var(--color-label-disable)">
  </div>
</div></body></html>
