<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head><body style="padding:24px">
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
  <div style="border:1px solid var(--color-line-normal);border-radius:var(--radius-m);background:var(--color-bg-white);padding:var(--padding-l)">
    <div style="font-size:11px;font-weight:600;color:var(--color-primary-normal);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">오늘</div>
    <div style="font-size:var(--font-size-xl);line-height:var(--line-height-xl);font-weight:600;margin-bottom:4px">가족 소식</div>
    <div style="font-size:var(--font-size-md);line-height:var(--line-height-md);color:var(--color-label-alternative)">따님이 사진을 보내셨어요.</div>
  </div>
  <div style="background:var(--color-primary-light);border:1px solid var(--color-primary-normal);border-radius:var(--radius-m);padding:var(--padding-l)">
    <div style="font-size:11px;font-weight:600;color:var(--color-primary-strong);text-transform:uppercase;margin-bottom:6px">알림</div>
    <div style="font-size:var(--font-size-xl);line-height:var(--line-height-xl);font-weight:600;color:var(--color-primary-heavy)">오늘 3시 약속</div>
    <div style="font-size:var(--font-size-md);line-height:var(--line-height-md);color:var(--color-primary-strong);margin-top:4px">병원 진료가 있어요.</div>
  </div>
</div></body></html>
