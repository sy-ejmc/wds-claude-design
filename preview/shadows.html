<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"></head>
<body style="padding:32px;background:var(--color-bg-50);font-family:var(--font-family)">

<div style="display:flex;flex-direction:column;gap:20px">
  <div style="display:flex;align-items:baseline;justify-content:space-between">
    <div>
      <div style="font-size:16px;font-weight:700;color:var(--color-label-normal)">Shadow</div>
      <div style="font-size:13px;color:var(--color-label-alternative);margin-top:4px;line-height:1.5;max-width:620px">
        그림자는 UI에 깊이감과 계층 구조를 더해 요소를 돋보이게 합니다. 4단계 스케일 — 각 레벨은 고정된 elevation 역할이 있으며 임의로 변형하지 않습니다.
      </div>
    </div>
    <div style="font-size:11px;color:var(--color-label-assistive);text-transform:uppercase;letter-spacing:0.5px">Effect Styles / Shadows</div>
  </div>

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:40px 24px;background:var(--color-bg-white);border-radius:12px">

    <!-- Shadow-1 -->
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center">
      <div style="width:140px;height:140px;border-radius:12px;background:var(--color-bg-white);box-shadow:var(--shadow-1);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--color-label-assistive)">1</div>
      <div style="text-align:center">
        <div style="font-size:14px;font-weight:600;color:var(--color-label-normal)">shadow-1</div>
        <div style="font-size:11px;color:var(--color-label-alternative);margin-top:2px;font-family:ui-monospace,Menlo,monospace">0 2 4 · 10%</div>
        <div style="font-size:11px;color:var(--color-label-alternative);margin-top:6px">card edge · resting</div>
      </div>
    </div>

    <!-- Shadow-2 -->
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center">
      <div style="width:140px;height:140px;border-radius:12px;background:var(--color-bg-white);box-shadow:var(--shadow-2);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--color-label-assistive)">2</div>
      <div style="text-align:center">
        <div style="font-size:14px;font-weight:600;color:var(--color-label-normal)">shadow-2</div>
        <div style="font-size:11px;color:var(--color-label-alternative);margin-top:2px;font-family:ui-monospace,Menlo,monospace">0 4 5 · 5%</div>
        <div style="font-size:11px;color:var(--color-label-alternative);margin-top:6px">subtle hover lift</div>
      </div>
    </div>

    <!-- Shadow-3 -->
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center">
      <div style="width:140px;height:140px;border-radius:12px;background:var(--color-bg-white);box-shadow:var(--shadow-3);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--color-label-assistive)">3</div>
      <div style="text-align:center">
        <div style="font-size:14px;font-weight:600;color:var(--color-label-normal)">shadow-3</div>
        <div style="font-size:11px;color:var(--color-label-alternative);margin-top:2px;font-family:ui-monospace,Menlo,monospace">0 8 24 · 10%</div>
        <div style="font-size:11px;color:var(--color-label-alternative);margin-top:6px">popover · dropdown</div>
      </div>
    </div>

    <!-- Shadow-4 -->
    <div style="display:flex;flex-direction:column;gap:16px;align-items:center">
      <div style="width:140px;height:140px;border-radius:12px;background:var(--color-bg-white);box-shadow:var(--shadow-4);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700;color:var(--color-label-assistive)">4</div>
      <div style="text-align:center">
        <div style="font-size:14px;font-weight:600;color:var(--color-label-normal)">shadow-4</div>
        <div style="font-size:11px;color:var(--color-label-alternative);margin-top:2px;font-family:ui-monospace,Menlo,monospace">0 12 48 · 10%</div>
        <div style="font-size:11px;color:var(--color-label-alternative);margin-top:6px">modal · sheet · highest</div>
      </div>
    </div>

  </div>
</div>

</body></html>
